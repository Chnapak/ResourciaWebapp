name: resourcia
services:
  resourcia.migrator:
    image: ${DOCKER_REGISTRY-}resourciaapi
    build:
      context: .
      dockerfile: Resourcia.Api/Dockerfile
    env_file:
      - ../../.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MIGRATE_ONLY=true
    depends_on:
      - resourcia.db
    restart: "no"

  resourcia.api:
    image: ${DOCKER_REGISTRY-}resourciaapi
    build:
      context: .
      dockerfile: Resourcia.Api/Dockerfile
    env_file:
      - ../../.env
    expose:
      - "5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - REDIS_URL=redis://resourcia.redis:6379
    volumes:
      - resourcia-api-data-protection:/home/app/.aspnet/DataProtection-Keys
      - resourcia-api-uploads:/app/wwwroot/uploads
    depends_on:
      resourcia.db:
        condition: service_started
      resourcia.redis:
        condition: service_started
      resourcia.migrator:
        condition: service_completed_successfully

  resourcia.frontend:
    image: ${DOCKER_REGISTRY-}resourciafrontend
    build:
      context: ../../ResourciaFrontend
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: production
    expose:
      - "80"
    depends_on:
      - resourcia.api

  resourcia.db:
    image: postgres:17
    env_file:
      - ../../.env
    expose:
      - "5432"
    volumes:
      - ./.containers/resourcia-db:/var/lib/postgresql/data

  resourcia.redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - ./.containers/resourcia-redis:/data

  resourcia.caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.containers/resourcia-caddy:/data
      - ./.containers/resourcia-caddy-config:/config
    depends_on:
      - resourcia.frontend
      - resourcia.api

  resourcia.backup:
    build:
      context: ./Backup
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      - POSTGRES_HOST=resourcia.db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BACKUP_KEEP_DAYS=7
      - AWS_ACCESS_KEY_ID=${BACKUP_S3_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${BACKUP_S3_SECRET_KEY}
    volumes:
      - resourcia-db-backups:/backups
    depends_on:
      - resourcia.db


networks:
  default:
    name: resourcia.local

volumes:
  resourcia-api-data-protection:
  resourcia-api-uploads:
  resourcia-db-backups:
