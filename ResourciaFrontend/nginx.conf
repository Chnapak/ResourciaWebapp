server {
    listen 80;
    server_name _;

    return 301 https://$http_host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    # Allow larger uploads (images up to 5MB + overhead)
    client_max_body_size 10m;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass https://resourcia.api:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_name localhost;
    }

    location /uploads/ {
        proxy_pass https://resourcia.api:5001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_name localhost;
    }

    location = /swagger {
        return 301 /swagger/;
    }

    location /swagger/ {
        proxy_pass https://resourcia.api:5001/swagger/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_name localhost;
    }

    location = /cs {
        return 301 $scheme://$http_host/cs/;
    }

    location /cs/ {
        try_files $uri $uri/ /cs/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
