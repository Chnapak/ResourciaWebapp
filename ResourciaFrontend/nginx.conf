server {
    listen 80;
    server_name https://80.211.207.170;

    return 301 https://$http_host$request_uri;
}

server {
    listen 443 ssl;
    server_name https://80.211.207.170;

    ssl_certificate /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    # Allow larger uploads (images up to 5MB + overhead)
    client_max_body_size 10m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://resourcia.api:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://resourcia.api:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /swagger {
        return 301 /swagger/;
    }

    location /swagger/ {
        proxy_pass http://resourcia.api:5000/swagger/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /cs {
        return 301 $scheme://$http_host/cs/;
    }

    location /cs/ {
        try_files $uri $uri/ /cs/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
