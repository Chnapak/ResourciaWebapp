<div class="auth-page flex w-full min-h-[600px]">

  <!-- Left decorative panel (hidden on mobile) -->
  <img
    class="grayscale brightness-40 h-full w-1/2 object-cover hidden md:block"
    src="./img/authbanner.jpg"
    alt="">

  <!-- Right: auth form panel -->
  <div class="flex flex-col w-full md:w-1/2 min-h-[600px] items-center justify-center px-4 py-10">

    <!-- App wordmark (mobile only) -->
    <p class="text-2xl font-bold text-blue-600 mb-6 md:hidden">Resourcia</p>

    <!-- Tab strip -->
    <div class="flex w-72 mb-6 bg-gray-100 rounded-[10px] p-1 gap-1" role="tablist">
      <button
        id="tab-login"
        role="tab"
        [attr.aria-selected]="activeTab === 'login'"
        (click)="setTab('login')"
        class="flex-1 py-2 text-sm font-semibold rounded-[8px] transition-all duration-200"
        [class.bg-white]="activeTab === 'login'"
        [class.shadow-sm]="activeTab === 'login'"
        [class.text-gray-900]="activeTab === 'login'"
        [class.text-gray-500]="activeTab !== 'login'">
        Sign in
      </button>
      <button
        id="tab-signup"
        role="tab"
        [attr.aria-selected]="activeTab === 'signup'"
        (click)="setTab('signup')"
        class="flex-1 py-2 text-sm font-semibold rounded-[8px] transition-all duration-200"
        [class.bg-white]="activeTab === 'signup'"
        [class.shadow-sm]="activeTab === 'signup'"
        [class.text-gray-900]="activeTab === 'signup'"
        [class.text-gray-500]="activeTab !== 'signup'">
        Create account
      </button>
    </div>

    <!-- OAuth provider buttons (future-ready, currently disabled) -->
    <div class="w-72 flex flex-col gap-2 mb-5">

      <!-- Google -->
      <button
        disabled
        title="Coming soon — sign in with email for now."
        class="oauth-btn w-full h-12 flex items-center gap-3 px-4 rounded-[4px] border border-gray-200
               bg-white text-sm font-medium text-gray-400 cursor-not-allowed select-none
               opacity-60 transition">
        <!-- Google G icon -->
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <!-- Microsoft -->
      <button
        disabled
        title="Coming soon — sign in with email for now."
        class="oauth-btn w-full h-12 flex items-center gap-3 px-4 rounded-[4px] border border-gray-200
               bg-white text-sm font-medium text-gray-400 cursor-not-allowed select-none
               opacity-60 transition">
        <!-- Microsoft squares icon -->
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 23 23" aria-hidden="true">
          <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
          <rect x="12" y="1" width="10" height="10" fill="#7FBA00"/>
          <rect x="1" y="12" width="10" height="10" fill="#00A4EF"/>
          <rect x="12" y="12" width="10" height="10" fill="#FFB900"/>
        </svg>
        Continue with Microsoft
      </button>
    </div>

    <!-- Or divider -->
    <div class="w-72 flex items-center gap-3 mb-5">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-xs text-gray-400 font-medium">or</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <!-- Animated tab content -->
    <div class="auth-tab-container w-72 overflow-hidden">
      <div class="auth-tab-track flex transition-transform duration-200 ease-out"
           [style.transform]="activeTab === 'login' ? 'translateX(0)' : 'translateX(-100%)'">

        <!-- Login form (slot 0) -->
        <div class="auth-tab-slide w-72 shrink-0">
          <app-login-form
            instanceId="page"
            (loginSuccess)="onLoginSuccess()">
          </app-login-form>
        </div>

        <!-- Register form (slot 1) -->
        <div class="auth-tab-slide w-72 shrink-0">
          <app-register-form
            instanceId="page"
            (registerSuccess)="onRegisterSuccess($event)">
          </app-register-form>
        </div>
      </div>
    </div>

  </div>
</div>
