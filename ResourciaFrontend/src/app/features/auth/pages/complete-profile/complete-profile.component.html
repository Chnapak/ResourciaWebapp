<!-- Complete-profile layout with hero image and form -->
<div class="flex min-h-screen w-full flex-col lg:flex-row">
  <!-- Decorative banner image -->
  <img class="hidden h-full w-1/2 object-cover grayscale brightness-40 lg:block" src="./img/authbanner.jpg" alt="complete profile banner">

  <!-- Form panel -->
  <div class="flex w-full flex-col items-center justify-center px-6 py-10 text-center lg:w-1/2">
    <div class="mb-6">
      <h1 i18n class="text-4xl font-bold m-3">Almost there!</h1>
      <p i18n class="text-slate-600">Finish setting up your account to start sharing resources.</p>
    </div>

    <!-- Display name form -->
    <form class="w-full max-w-[420px] flex flex-col justify-center items-center" [formGroup]="form" (ngSubmit)="onSubmit()">
      
      <app-textfield 
        label="Choose a Username"
        i18n-label 
        type="text" 
        placeholder="e.g. explorer_01" 
        i18n-placeholder
        formControlName="displayName">
      </app-textfield>

      @if (usernameInUse) {
        <div i18n class="w-full text-left text-xs text-red-700 mt-1">This username is already taken.</div>
      }

      @if (inviteRequired) {
        <div i18n class="w-full text-left text-xs text-amber-700 mt-1">Resourcia is currently invite-only. Ask an admin for beta access.</div>
      }

      <div class="w-full text-left mt-2">
        @if (generalError) {
          <div i18n class="text-xs text-red-700">Something went wrong. Please try again.</div>
        }
      </div>
      
      <ui-button 
        i18n
        class="w-full mt-6"
        [fullWidth]="true"
        type="submit"
        variant="primary"
        [loading]="isSubmitting"
        [disabled]="isSubmitting">
        Complete Setup
      </ui-button>
    </form>
  </div>
</div>
