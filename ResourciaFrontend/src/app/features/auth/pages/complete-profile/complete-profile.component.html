<div class="flex w-full h-150">
  <img class="grayscale brightness-40 h-full w-1/2 object-cover" src="./img/authbanner.jpg" alt="complete profile banner">

  <div class="flex flex-col w-1/2 h-full items-center justify-center text-center px-10">
    <div class="mb-6">
      <h1 i18n class="text-4xl font-bold m-3">Almost there!</h1>
      <p i18n class="text-slate-600">Finish setting up your account to start sharing resources.</p>
    </div>

    <form class="w-2/3 flex flex-col justify-center items-center" [formGroup]="form" (ngSubmit)="onSubmit()">
      
      <app-textfield 
        label="Choose a Username"
        i18n-label 
        type="text" 
        placeholder="e.g. explorer_01" 
        i18n-placeholder
        formControlName="displayName">
      </app-textfield>

      @if (usernameInUse) {
        <div i18n class="w-70 text-left text-xs text-red-700 mt-1">This username is already taken.</div>
      }

      <div class="w-70 text-left mt-2">
        @if (generalError) {
          <div i18n class="text-xs text-red-700">Something went wrong. Please try again.</div>
        }
      </div>
      
      <ui-button 
        i18n
        class="w-70 mt-6"
        [fullWidth]="true"
        type="submit"
        variant="primary"
        [loading]="isSubmitting"
        [disabled]="isSubmitting">
        Complete Setup
      </ui-button>
    </form>
  </div>
</div>
