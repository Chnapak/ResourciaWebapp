<!-- ── Hero ──────────────────────────────────────────────── -->
<section class="ep-hero">
  <div class="ep-hero__inner">

    <!-- Breadcrumb -->
    <nav class="ep-hero__breadcrumb" aria-label="Breadcrumb">
      <a routerLink="/">Home</a>
      <span class="sep">›</span>
      <a [routerLink]="['/profile', originalProfileIdentifier || username]">Profile</a>
      <span class="sep">›</span>
      <span class="current">Edit Profile</span>
    </nav>

    <!-- Identity line -->
    <div class="ep-hero__identity">
      <div class="ep-avatar-shell">
        <div class="ep-avatar-frame">
          <div class="ep-avatar" [class.ep-avatar--image]="avatarUrl">
            @if (avatarUrl) {
              <img [src]="avatarUrl" alt="Profile photo" class="ep-avatar__image" />
            } @else {
              {{ avatarInitial }}
            }
          </div>
          <input
            id="avatar-upload"
            type="file"
            accept="image/png,image/jpeg,image/gif"
            class="ep-avatar__input"
            (change)="avatarSelected.emit($event)"
            [disabled]="avatarUploading"
          />
          <label
            class="ep-avatar__badge"
            [class.ep-avatar__badge--disabled]="avatarUploading"
            for="avatar-upload"
            title="Change photo"
          >
            <span class="ep-avatar__badge-icon">✎</span>
          </label>
        </div>
        <div class="ep-avatar__actions">
          <button
            type="button"
            class="ep-avatar__action"
            (click)="removeAvatar.emit()"
            [disabled]="!avatarUrl || avatarUploading"
          >
            {{ avatarUploading ? 'Working...' : 'Remove' }}
          </button>
        </div>
        @if (avatarError) {
          <span class="ep-avatar__status ep-avatar__status--error">{{ avatarError }}</span>
        } @else if (avatarSuccess) {
          <span class="ep-avatar__status ep-avatar__status--success">{{ avatarSuccess }}</span>
        } @else {
          <span class="ep-avatar__status">PNG, JPG, or GIF (max 5MB)</span>
        }
      </div>

      <div class="ep-hero__title">
        <h1>Edit Your Profile</h1>
        <p>Customize how you appear to the Resourcia community.</p>
      </div>
    </div>

  </div>
</section>
