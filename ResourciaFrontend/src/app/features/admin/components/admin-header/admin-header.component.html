<!-- Admin header wrapper with title and actions slot -->
<div class="px-4 py-5 border-b border-slate-200 sm:px-8 sm:py-6">
    <div class="flex flex-col gap-3 sm:flex-row sm:justify-between sm:items-start mb-4">
        <div>
            <h1 i18n class="text-2xl font-bold text-slate-900 tracking-tight">Manage {{ title }}</h1>
        </div>

        <div class="flex flex-wrap gap-3 items-center">
            <!-- Consumer-provided action buttons -->
            <ng-content select="[actions]"></ng-content>
        </div>
    </div>
</div>
