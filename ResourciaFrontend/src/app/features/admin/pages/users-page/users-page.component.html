<!-- Admin users page -->
<div class="bg-white rounded-lg shadow-sm">
    <!-- Users header -->
    <app-admin-header [title]="'Users'"></app-admin-header>
    <!-- Users table with selectable rows -->
    <app-admin-table
        [columns]="columns"
        [selectable]="true"
        [checked]="allSelected"
        [indeterminate]="someSelected"
        (toggleAll)="onToggleAll($event)"
    >
        @for (user of users; track user.id) {
            <!-- Each row displays user info and actions -->
            <app-user-row
                [user]="user"
                [selected]="selectedIds.has(user.id)"
                (toggle)="onToggleOne($event.id, $event.checked)"
            ></app-user-row>
        }
    </app-admin-table>

</div>
