<!-- Ratings and reviews card. -->
<div class="bg-white border border-gray-200 rounded-2xl p-7 shadow-card">
    <h2 class="font-display font-bold text-lg mb-5">Ratings & Reviews</h2>

    <!-- Rating aggregates -->
    <app-resource-rating-overview
        [resource]="resource"
    ></app-resource-rating-overview>

    <!-- Review input -->
    <app-resource-rating-input
        (reviewChange)="reviewChange.emit()"
    ></app-resource-rating-input>

    <!-- Review list -->
    <app-resource-review-list
        [resource]="resource"
    ></app-resource-review-list>
</div>
