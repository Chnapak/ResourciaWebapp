<!-- Rating overview with score + distribution bars. -->
<div class="grid grid-cols-1 gap-5 items-center sm:grid-cols-[auto_1fr] sm:gap-8">
    <!-- Score Block -->
    <div class="text-center bg-gray-50 border border-gray-200 rounded-2xl px-4 py-4 sm:px-6">
        <div class="font-display font-extrabold text-[2.75rem] text-gray-900 leading-none sm:text-[3.5rem]">
            @if (totalRatings != 0) {
                {{ avgScore.toFixed(1) }}
            }@else {
                --
            }
            
        </div>

        <!-- Star row -->
        <div class="flex justify-center gap-1 my-2">
            @for (i of [1,2,3,4,5]; track i) {
                <div class="relative text-[1.2rem] leading-none">
                    <span class="text-gray-300">★</span>
                    <span
                        class="text-amber-400 absolute left-0 top-0 overflow-hidden"
                        [style.opacity.%]="rating.getStarFill(i) * 100">
                        ★
                    </span>
                </div>
            }
        </div>

        <!-- Totals + sentiment -->
        <div class="text-xs text-gray-400">{{ totalRatings }} ratings · {{ reviewCount }} reviews</div>

        <div class="mt-2 inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-semibold"
        [ngClass]="rating.getSentimentClasses()">
        ✦ {{ rating.getSentiment() }}
        </div>
    </div>

    <!-- Distribution Bars -->
    <div class="flex min-w-0 flex-col gap-2">
        @for (item of rating.getDistribution(); track item.stars) {
            <div class="flex items-center gap-3">
                <span class="text-xs text-gray-400 w-4 text-right">{{item.stars}}</span>
                <div class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                    <div class="bar-fill h-full bg-amber-400 rounded-full" [style.width.%]="rating.getPercentage(item.count)"></div>
                </div>
                <span class="text-xs text-gray-400 w-8">{{ item.count | number }}</span>
            </div>
        }
    </div>
</div>
