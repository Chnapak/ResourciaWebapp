<div class="border-t border-gray-200 pt-5 mt-5 mb-5">

  <div class="flex justify-between gap-3">
    
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full 
                  flex items-center justify-center text-xs font-bold text-white"
            [style.background]="gradient"
        >
          {{initials}}
        </div>

      <div>
        <div class="font-semibold text-sm">
            {{ review.username }}
        </div>
        <div class="text-xs text-gray-400">
            {{review.createdAt | date:'short'}}
        </div>
      </div>
    </div>
  </div>

  <!-- rating -->
  <div class="flex gap-0.5 my-2">
    @for (i of [1,2,3,4,5]; track $index) {
      <span
          class="text-sm"
          [class.text-amber-400]="i <= review.rating"
          [class.text-gray-300]="i > review.rating">
      ★
      </span>
    }
  </div>

  <!-- text -->
  <p class="text-sm text-gray-500 leading-relaxed">
    {{review.content}}
  </p>

  <!-- actions -->
  <div class="flex items-center gap-3 mt-3">

    <button (click)="vote(true)" [disabled]="voting"
      class="flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-full border transition-colors
            hover:bg-green-50 hover:border-green-300 hover:text-green-600"
      [class.text-green-600]="review.userVote === true"
      [class.border-green-400]="review.userVote === true"
      [class.bg-green-50]="review.userVote === true"
      [class.text-gray-400]="review.userVote !== true"
      [class.border-gray-200]="review.userVote !== true">
      👍 Helpful ({{ review.upvotes }})
    </button>

    <!-- 👎 Not helpful -->
    <button (click)="vote(false)" [disabled]="voting"
      class="flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-full border transition-colors
            hover:bg-red-50 hover:border-red-300 hover:text-red-600"
      [class.text-red-600]="review.userVote === false"
      [class.border-red-400]="review.userVote === false"
      [class.bg-red-50]="review.userVote === false"
      [class.text-gray-400]="review.userVote !== false"
      [class.border-gray-200]="review.userVote !== false">
      👎 Not helpful ({{ review.downvotes }})
    </button>

  </div>
</div>
