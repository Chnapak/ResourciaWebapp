<!-- Sidebar actions for this resource. -->
<div class="bg-white border border-gray-200 rounded-2xl p-4 shadow-card flex flex-col gap-2 sm:p-5">
    <!-- Save/unsave button. -->
    <button (click)="handleFavorite()"
            [disabled]="favoritePending"
            class="flex min-h-11 items-center gap-2.5 rounded-lg border border-blue-600 bg-blue-600 px-4 py-2.5 text-left text-sm font-semibold text-white transition-all hover:bg-blue-700">
    <span class="w-5 text-center">{{ isSaved ? '♥' : '♡' }}</span> {{ favoriteLabel }}
    </button>
    <!-- Share link action. -->
    <button (click)="handleShare()"
            class="flex min-h-11 items-center gap-2.5 rounded-lg border border-gray-200 bg-white px-4 py-2.5 text-left text-sm font-medium text-gray-900 transition-all hover:bg-gray-50">
    <span class="w-5 text-center">⤴</span> Share Resource
    </button>
    <!-- Suggest improvement (placeholder). -->
    <button (click)="handleSuggestImprovement()"
            class="flex min-h-11 items-center gap-2.5 rounded-lg border border-gray-200 bg-white px-4 py-2.5 text-left text-sm font-medium text-gray-900 transition-all hover:bg-gray-50">
    <span class="w-5 text-center">✏️</span> Suggest Improvement
    </button>
    <!-- Report issue action. -->
    <button (click)="handleReportIssue()"
            class="flex min-h-11 items-center gap-2.5 rounded-lg border border-gray-200 bg-white px-4 py-2.5 text-left text-sm font-medium text-gray-900 transition-all hover:border-red-200 hover:bg-red-50 hover:text-red-600">
    <span class="w-5 text-center">⚑</span> Report Issue
    </button>
</div>
