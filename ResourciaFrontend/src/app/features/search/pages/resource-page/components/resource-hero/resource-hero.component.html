<div class="bg-gradient-to-br from-slate-900 via-blue-900 to-blue-700 hero-pattern pt-10 pb-0 px-8 min-h-[400px]">
  <div class="max-w-6xl mx-auto">
 
    <div class="grid grid-cols-[1fr_340px] gap-10 items-start">
 
      <div>
        <app-resource-header 
          [resource]="resource">
        </app-resource-header>
 
        <app-resource-tag-list
          [resource]="resource"
        ></app-resource-tag-list>
 
        <app-resource-rating-summary
          [resource]="resource"
        ></app-resource-rating-summary>
 
        <app-resource-hero-actions
          [resource]="resource"
          [favoritePending]="favoritePending"
          (favoriteToggle)="favoriteToggle.emit()"
        ></app-resource-hero-actions>        
      </div>
 
      <!-- RIGHT: Preview Panel (overlaps fold) -->
      <div class="bg-black/30 border border-white/10 rounded-card overflow-hidden translate-y-8 shadow-lg backdrop-blur-sm">
        <!-- Thumbnail -->
        <app-resource-preview-panel></app-resource-preview-panel>
      </div>
 
    </div>
  </div>
</div>
