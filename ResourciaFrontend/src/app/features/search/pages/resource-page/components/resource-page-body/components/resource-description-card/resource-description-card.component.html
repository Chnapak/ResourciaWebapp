<!-- Resource description card with expandable text. -->
<div class="bg-white border border-gray-200 rounded-2xl p-4 shadow-card sm:p-7">
    <div class="flex flex-col gap-3 mb-5 sm:flex-row sm:items-center sm:justify-between">
    <h2 class="font-display font-bold text-lg">About this Resource</h2>
    <!-- Toggle description visibility. -->
    <button (click)="toggleDesc()"
            class="text-blue-600 font-semibold text-sm flex items-center gap-1 hover:underline hover:cursor-pointer">
        @if (isExpanded) {
            Show less ↓
        } @else {
            Show more ↓
        }
    </button>
    </div>
    <!-- Description text with line clamp when collapsed. -->
    <p 
        class="break-words text-[0.95rem] leading-relaxed text-gray-500"
        [class.line-clamp-4]="!isExpanded">
        {{ resource?.description }}
    </p>
    <!-- Facet chips for quick navigation. -->
    <div class="flex flex-wrap gap-2 mt-4">
        @for (chip of resource?.facets; track $index) {
            <app-chip (click)="transferToSearch(chip)" [clickable]="true">{{chip.label}}</app-chip>
        }
    </div>
</div>
