<!-- Hero actions: visit, share, save. -->
<div class="flex flex-col gap-3 pb-2 sm:flex-row sm:flex-wrap lg:pb-10">
  <!-- Primary CTA to open the resource URL. -->
  <ui-button
    variant="primary"
    size="lg"
    [href]="resource?.url ?? null"
    class="shadow-[0_4px_12px_rgba(37,99,235,0.4)] hover:shadow-[0_6px_20px_rgba(37,99,235,0.5)] hover:-translate-y-0.5 transition-all duration-200"
  >
    <i class="fa-solid fa-arrow-up-right-from-square"></i>
    <span>Visit Resource</span>
  </ui-button>

  <!-- Share button (copies link). -->
  <ui-button
    variant="outline"
    size="lg"
    type="button"
    (click)="handleShare()"
    class="backdrop-blur-sm"
  >
    <i class="fa-solid fa-share-nodes"></i>
    <span>Share Resource</span>
  </ui-button>

  <!-- Save/unsave favorite button. -->
  <ui-button
    variant="outline"
    size="lg"
    type="button"
    [disabled]="favoritePending"
    (click)="handleFavorite()"
    class="backdrop-blur-sm"
  >
    <i [class]="favoriteIconClass"></i>
    <span>{{ favoriteLabel }}</span>
  </ui-button>
</div>
