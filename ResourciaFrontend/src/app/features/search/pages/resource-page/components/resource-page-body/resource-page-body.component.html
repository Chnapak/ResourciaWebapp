<div class="max-w-6xl mx-auto px-8 pt-14 pb-16 grid grid-cols-[1fr_300px] gap-10 items-amber-400t">
 
  <!-- ── MAIN COLUMN ── -->
  <div class="flex flex-col gap-7">
 
    <!-- Description Card -->
    <app-resource-description-card
      [resource]="resource"
    ></app-resource-description-card>

    <!-- Ratings & Reviews Card -->
    <app-resource-ratings
      [resource]="resource"
      (reviewChange)="infoChange.emit()"
    ></app-resource-ratings>

    <!-- Discussion Card -->
    <app-resource-discussion-section
      [resource]="resource"
    ></app-resource-discussion-section>
  </div>

  <!-- Info Card -->
  <app-resource-info-card [resource]="resource"></app-resource-info-card>
 
    <!-- Actions Card -->
    <app-resource-action-card></app-resource-action-card>
 
    <!-- Related Resources -->
    <div class="bg-white border border-gray-200 rounded-2xl p-5 shadow-card">
      <div class="text-[0.7rem] font-bold tracking-widest uppercase text-gray-400 mb-4">Related Resources</div>
      <div class="flex flex-col gap-1">
        <div class="flex gap-3 p-2 rounded-lg card-hover cursor-pointer">
          <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-pink-400 to-rose-500 flex items-center justify-center text-base flex-shrink-0">📊</div>
          <div>
            <div class="text-[0.825rem] font-semibold leading-snug">3Blue1Brown: Essence of Linear Algebra</div>
            <div class="text-xs text-gray-400 mt-0.5">★ 4.9 · YouTube · Free</div>
          </div>
        </div>
        <div class="flex gap-3 p-2 rounded-lg card-hover cursor-pointer">
          <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-emerald-400 to-teal-400 flex items-center justify-center text-base flex-shrink-0">📚</div>
          <div>
            <div class="text-[0.825rem] font-semibold leading-snug">Khan Academy: Linear Algebra</div>
            <div class="text-xs text-gray-400 mt-0.5">★ 4.6 · khanacademy.org · Free</div>
          </div>
        </div>
        <div class="flex gap-3 p-2 rounded-lg card-hover cursor-pointer">
          <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-sky-400 to-cyan-400 flex items-center justify-center text-base flex-shrink-0">🛠️</div>
          <div>
            <div class="text-[0.825rem] font-semibold leading-snug">Jupyter: Linear Algebra Notebooks</div>
            <div class="text-xs text-gray-400 mt-0.5">★ 4.7 · GitHub · Free</div>
          </div>
        </div>
      </div>
    </div>
 
  </div><!-- /sidebar -->
