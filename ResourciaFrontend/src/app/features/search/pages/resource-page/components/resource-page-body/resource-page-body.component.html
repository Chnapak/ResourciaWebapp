<!-- Two-column resource detail layout (content + sidebar). -->
<div class="mx-auto grid max-w-6xl grid-cols-1 gap-6 px-4 pb-16 pt-8 sm:px-6 lg:grid-cols-[minmax(0,1fr)_300px] lg:gap-10 lg:px-8 lg:pt-14">

  <!-- Main content column. -->
  <div class="min-w-0 flex flex-col gap-6 lg:gap-7">

    <app-resource-description-card
      [resource]="resource"
    ></app-resource-description-card>

    <app-resource-ratings
      [resource]="resource"
      (reviewChange)="infoChange.emit()"
    ></app-resource-ratings>

    <app-resource-discussion-section
      [resource]="resource"
    ></app-resource-discussion-section>
  </div>

  <!-- Sidebar stacks underneath the main content on phones. -->
  <aside class="min-w-0 space-y-5" aria-label="Resource details and actions">
    <app-resource-info-card
      [resource]="resource"
      [historyLink]="historyLink"
    ></app-resource-info-card>

    <app-resource-action-card
      [resource]="resource"
      [favoritePending]="favoritePending"
      (favoriteToggle)="favoriteToggle.emit()"
      (suggestImprovement)="suggestImprovement.emit()"
    ></app-resource-action-card>

    <!-- Related resources (static placeholders). -->
    <div class="bg-white border border-gray-200 rounded-2xl p-4 shadow-card sm:p-5">
      <div class="mb-4 text-[0.7rem] font-bold uppercase tracking-widest text-gray-400">Related Resources</div>
      <div class="flex flex-col gap-1">
        <div class="flex gap-3 rounded-lg p-2 card-hover cursor-pointer">
          <div class="flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-lg bg-gradient-to-br from-pink-400 to-rose-500 text-base">📊</div>
          <div class="min-w-0">
            <div class="text-[0.825rem] font-semibold leading-snug">3Blue1Brown: Essence of Linear Algebra</div>
            <div class="mt-0.5 text-xs text-gray-400">★ 4.9 · YouTube · Free</div>
          </div>
        </div>
        <div class="flex gap-3 rounded-lg p-2 card-hover cursor-pointer">
          <div class="flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-lg bg-gradient-to-br from-emerald-400 to-teal-400 text-base">📚</div>
          <div class="min-w-0">
            <div class="text-[0.825rem] font-semibold leading-snug">Khan Academy: Linear Algebra</div>
            <div class="mt-0.5 text-xs text-gray-400">★ 4.6 · khanacademy.org · Free</div>
          </div>
        </div>
        <div class="flex gap-3 rounded-lg p-2 card-hover cursor-pointer">
          <div class="flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-lg bg-gradient-to-br from-sky-400 to-cyan-400 text-base">🛠️</div>
          <div class="min-w-0">
            <div class="text-[0.825rem] font-semibold leading-snug">Jupyter: Linear Algebra Notebooks</div>
            <div class="mt-0.5 text-xs text-gray-400">★ 4.7 · GitHub · Free</div>
          </div>
        </div>
      </div>
    </div>
  </aside>
</div>
