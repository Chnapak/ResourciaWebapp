<!-- Discussion composer input and submit action. -->
<div class="flex flex-col gap-3 mt-4 sm:flex-row sm:items-center">
  <!-- Input -->
  <input
    [(ngModel)]="text"
    type="text"
    class="min-h-11 flex-1 rounded-lg border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm outline-none transition-all focus:border-blue-500 focus:bg-white"
    placeholder="Ask a question or share a tip…"
    (keydown.enter)="submit()"
  />

  <!-- Button -->
  <button
    (click)="submit()"
    class="min-h-11 rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition-all hover:bg-blue-700"
  >
    Post
  </button>

</div>
