<div class="mt-6 bg-gray-50 border border-gray-200 rounded-2xl p-5">
    <div class="font-semibold text-[0.95rem] mb-3">Rate this resource</div>

    <div class="flex gap-1 mb-4 cursor-pointer">
        @for (i of [1,2,3,4,5]; track i) {

            <span
            class="text-[1.75rem] cursor-pointer select-none transition-colors duration-150"
            (mouseenter)="setHover(i)"
            (mouseleave)="clearHover()"
            (click)="setRating(i)"
            [class.text-amber-400]="i <= displayRating"
            [class.text-gray-300]="i > displayRating">
            ★
            </span>

        }
    </div>

    <app-textarea
    class="w-full"
    label="Review"
    placeholder="Share your experience with this resource (optional)…"
    background="white"
    [control]="reviewControl"
    [showCharCounter]="true"
    [autoGrow]="true"
    />

    <ui-button
    class="mt-3"
    variant="primary"
    size="md"
    (click)="submitReview()"
    [disabled]="rating === 0"
    >
        Submit Review
    </ui-button>
</div>
