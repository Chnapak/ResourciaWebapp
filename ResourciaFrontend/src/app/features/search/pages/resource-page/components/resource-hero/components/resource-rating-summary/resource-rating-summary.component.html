<div class="flex items-center gap-4 mb-7">
    <span class="font-display font-extrabold text-5xl text-amber-400 leading-none"
    [class.text-gray-400]="!hasRating"
    >
    @if (hasRating) {
        {{ avgScore.toFixed(1) }}
    }@else {
        --
    }
    </span>
    <div class="flex flex-col gap-1">
    <div class="flex gap-0.5">
        @for (i of [1,2,3,4,5]; track i) {
            <div class="relative text-[1.2rem] leading-none">
            
            <span class="text-gray-300">★</span>

            <span
                class="text-amber-400 absolute left-0 top-0 overflow-hidden whitespace-nowrap"
                [style.width.%]="rating.getStarFill(i) * 100"
            >
                ★
            </span>

            </div>
        }
    </div>
    <div class="text-white/55 text-sm">{{ totalRatings }} ratings · {{ reviewCount }} reviews</div>
    <div class="text-white/40 text-xs">{{rating.getSentiment()}}</div>
    </div>
</div>
