<div class="flex gap-3 py-4 border-b border-gray-200">
  <div class="w-[34px] h-[34px] rounded-full flex items-center justify-center text-xs font-bold text-white"
  [style.background]="gradient()">
    {{ initials() }}
  </div>

  <div class="flex-1">
    <div class="flex items-baseline gap-2 mb-1">
      <span class="font-semibold text-sm">{{ thread.username }}</span>
      <span class="text-xs text-gray-400">{{ thread.createdAt }}</span>
    </div>

    <p class="text-sm text-gray-500">{{ thread.content }}</p>

    <button class="text-xs font-semibold text-gray-400 hover:text-blue-600 mt-2">
      ↳ Reply
    </button>

    <!-- Replies -->
    <div class="pl-10 mt-3 space-y-3">
      <div class="flex gap-3">
        @for(reply of thread.replies; track $index) {
          <div class="w-7 h-7 rounded-full flex items-center justify-center text-[0.65rem] font-bold text-white"
              [style.background]="gradient(reply.username)">
            {{ initials(reply.username) }}
          </div>

          <div>
            <div class="flex gap-2 text-xs">
              <span class="font-semibold">{{ reply.username }}</span>
              <span class="text-gray-400">{{ reply.createdAt }}</span>
            </div>

            <p class="text-sm text-gray-500">{{ reply.content }}</p>
          </div>
        }
      </div>
    </div>
  </div>
</div>
