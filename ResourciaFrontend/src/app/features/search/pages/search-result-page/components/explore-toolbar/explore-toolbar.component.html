<!-- Toggle filters sidebar. -->
<ui-button variant="outline" size="lg" (click)="hideFilters()">
  @if (areFiltersHidden) {
    <span i18n>Show Filters</span>
  } @else {
    <span i18n>Hide Filters</span>
  }
</ui-button>

<!-- Results summary and actions. -->
<div class="mb-[16px] flex items-center justify-between">
  <div class="text-[15px] text-gray-400">
    @if ((numberOfResources ?? 0) === 1) {
      <span i18n>Showing <strong>{{ numberOfResources }} result</strong></span>
    } @else {
      <span i18n>Showing <strong>{{ numberOfResources }} results</strong></span>
    }
  </div>

  <!-- Primary actions (add resource + sort). -->
  <div class="flex items-center gap-[12px]">
    <ui-button variant="primary" size="md" [routerLink]="['/addresource']">
      <span aria-hidden="true">+</span>
      <span i18n>Add Resource</span>
    </ui-button>

    <!-- Sort selector (UI only for now). -->
    <div>
      <select class="cursor-pointer rounded-[8px] border border-gray-400 bg-white px-[16px] py-[8px] text-[14px] outline-0 focus:border-blue-500">
        <option i18n>Most relevant</option>
        <option i18n>Most popular</option>
        <option i18n>Highest rated</option>
        <option i18n>Newest</option>
      </select>
    </div>
  </div>
</div>

@if (chips.length > 0) {
  <!-- Active filter chips. -->
  <div class="mb-[24px] flex flex-wrap items-center gap-[10px]">
    @for (chip of chips; track chip.key + '-' + chip.value) {
      <button
        type="button"
        class="inline-flex items-center gap-[8px] rounded-[20px] border border-gray-400 bg-gray-100 px-[14px] py-[6px] text-[13px]"
        (click)="onRemoveChip(chip)"
      >
        <span>{{ chip.label }}</span>
        <span class="cursor-pointer font-bold text-gray-400 hover:text-blue-500">×</span>
      </button>
    }

    <!-- Clear all chips. -->
    <button
      type="button"
      class="cursor-pointer text-[13px] text-blue-500 underline"
      (click)="onClearAll()"
    >
      <span i18n>Clear all</span>
    </button>
  </div>
}
