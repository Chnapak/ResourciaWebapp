<!-- Radio facet group. -->
<div role="radiogroup" [attr.aria-label]="label">
    @for (opt of options; track $index) {
        <!-- Individual radio option. -->
        <app-radio
            [label]="opt.label"
            [value]="opt.value"
            [selected]="selected === opt.value"
            [disabled]="opt.disabled ?? false"
            (select)="onSelect($event)"
        />
    }
</div>
