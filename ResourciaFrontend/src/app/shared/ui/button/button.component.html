<ng-template #content>
  <ng-content />
</ng-template>

<!-- External link -->
@if (href) {
  <a
    [href]="href"
    target="_blank"
    rel="noopener noreferrer"
    [class]="classes"
    [attr.aria-busy]="loading ? 'true' : null"
  >
    <ng-container [ngTemplateOutlet]="content" />
  </a>
} 
<!-- Internal routerLink -->
@else if (routerLink) {
  <a
    [routerLink]="routerLink"
    [queryParams]="queryParams"
    [class]="classes"
    [attr.aria-busy]="loading ? 'true' : null"
  >
    <ng-container [ngTemplateOutlet]="content" />
  </a>
} 
<!-- Regular button -->
@else {
  <button
    [type]="type"
    [class]="classes"
    [disabled]="disabled || loading"
    [attr.aria-busy]="loading ? 'true' : null"
  >
    @if (loading) {
      <i class="fa-solid fa-spinner fa-spin mr-2"></i>
      Submitting...
    } @else {
      <ng-container [ngTemplateOutlet]="content" />
    }
  </button>
}
