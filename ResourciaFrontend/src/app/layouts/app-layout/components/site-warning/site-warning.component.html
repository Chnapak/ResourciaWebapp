<div id="warning" class="warning fixed left-1/2 top-3 z-20 w-[calc(100%-24px)] max-w-[960px] -translate-x-1/2 rounded-xl border border-gray-300 bg-yellow-100 px-3 py-2 text-sm md:top-4 md:rounded-full md:px-4 md:py-3 md:text-base">
    <div class="flex items-start justify-between gap-3 md:items-center">
        <span class="leading-snug"> {{message}} </span>
        <button class="shrink-0 hover:cursor-pointer" aria-label="Close" (click)="closeWarning()">
        <svg xmlns="http://www.w3.org/2000/svg" 
            fill="none" viewBox="0 0 24 24" 
            stroke-width="2" stroke="currentColor" 
            class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
        </button>
    </div>
</div>
