name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.cjs

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Lint (backend)
        shell: pwsh
        run: ./scripts/ci.ps1 -Task lint -Scope backend

      - name: Test (backend)
        shell: pwsh
        run: ./scripts/ci.ps1 -Task test -Scope backend

      - name: Build (backend)
        shell: pwsh
        run: ./scripts/ci.ps1 -Task build -Scope backend

      - name: Upload backend build
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: ResourciaBackend/src/Resourcia.Api/bin/Release/net9.0/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ResourciaFrontend/package-lock.json

      - name: Install dependencies
        working-directory: ResourciaFrontend
        run: npm ci

      - name: Lint (frontend)
        shell: pwsh
        run: ./scripts/ci.ps1 -Task lint -Scope frontend

      - name: Test (frontend)
        shell: pwsh
        env:
          CHROME_BIN: /usr/bin/google-chrome
          CI: "true"
        run: ./scripts/ci.ps1 -Task test -Scope frontend

      - name: Build (frontend)
        shell: pwsh
        run: ./scripts/ci.ps1 -Task build -Scope frontend

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ResourciaFrontend/dist/resourcia-frontend/

  e2e:
    needs: [frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ResourciaFrontend/package-lock.json

      - name: Install dependencies
        working-directory: ResourciaFrontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ResourciaFrontend
        run: npx playwright install --with-deps

      - name: E2E (frontend)
        shell: pwsh
        env:
          CI: "true"
        run: ./scripts/ci.ps1 -Task e2e -Scope frontend

  deploy:
    needs: [backend, frontend, e2e, commitlint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Deploy via SSH
        if: ${{ env.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          port: ${{ env.DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd "${{ env.DEPLOY_PATH }}"
            git fetch --all
            git checkout main
            git pull
            cd ResourciaBackend/src
            docker compose up -d --build
      - name: Skip deploy (missing secrets)
        if: ${{ env.DEPLOY_HOST == '' }}
        run: echo "DEPLOY_HOST not set, skipping deploy."
