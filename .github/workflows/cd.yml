name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy_staging:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    env:
      STAGING_DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
      STAGING_DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
      STAGING_DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
      STAGING_DEPLOY_PORT: ${{ secrets.STAGING_DEPLOY_PORT }}
      STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
    steps:
      - name: Deploy via SSH (staging)
        if: ${{ env.STAGING_DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ env.STAGING_DEPLOY_HOST }}
          username: ${{ env.STAGING_DEPLOY_USER }}
          key: ${{ env.STAGING_DEPLOY_KEY }}
          port: ${{ env.STAGING_DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd "${{ env.STAGING_DEPLOY_PATH }}"
            git fetch --all
            git checkout main
            git pull
            cd ResourciaBackend/src
            docker compose up -d --build
      - name: Skip deploy (missing secrets)
        if: ${{ env.STAGING_DEPLOY_HOST == '' }}
        run: echo "STAGING_DEPLOY_HOST not set, skipping deploy."

  deploy_production:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production
    env:
      PROD_DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
      PROD_DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
      PROD_DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
      PROD_DEPLOY_PORT: ${{ secrets.PROD_DEPLOY_PORT }}
      PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
    steps:
      - name: Deploy via SSH (production)
        if: ${{ env.PROD_DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ env.PROD_DEPLOY_HOST }}
          username: ${{ env.PROD_DEPLOY_USER }}
          key: ${{ env.PROD_DEPLOY_KEY }}
          port: ${{ env.PROD_DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd "${{ env.PROD_DEPLOY_PATH }}"
            git fetch --all
            git checkout main
            git pull
            cd ResourciaBackend/src
            docker compose up -d --build
      - name: Skip deploy (missing secrets)
        if: ${{ env.PROD_DEPLOY_HOST == '' }}
        run: echo "PROD_DEPLOY_HOST not set, skipping deploy."
