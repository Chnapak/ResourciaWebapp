name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to deploy"
        required: true
        default: "main"
        type: string

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
      VPS_COMPOSE_FILE: ${{ secrets.VPS_COMPOSE_FILE }}
      VPS_HEALTHCHECK_URL: ${{ secrets.VPS_HEALTHCHECK_URL }}

    steps:
      - name: Validate deployment secrets
        shell: bash
        run: |
          missing=0

          for secret_name in VPS_HOST VPS_USER VPS_APP_PATH; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Required GitHub secret ${secret_name} is not set."
              missing=1
            fi
          done

          if [ -z "$VPS_SSH_KEY" ] && [ -z "$VPS_PASSWORD" ]; then
            echo "::error::Set either VPS_SSH_KEY or VPS_PASSWORD as a GitHub secret."
            missing=1
          fi

          exit "$missing"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT || '22' }}
          script_stop: true
          command_timeout: 20m
          envs: DEPLOY_REF,VPS_APP_PATH,VPS_COMPOSE_FILE
          script: |
            set -eu

            app_path="${VPS_APP_PATH}"
            compose_file="${VPS_COMPOSE_FILE:-docker-compose.yml}"
            deploy_ref="${DEPLOY_REF:-main}"

            cd "$app_path"

            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "Server checkout has local changes. Commit or clean them before deploying."
              exit 1
            fi

            git fetch --all --prune
            git fetch origin --tags --force

            if git rev-parse -q --verify "refs/tags/$deploy_ref" >/dev/null; then
              git checkout --detach "refs/tags/$deploy_ref"
            else
              git checkout "$deploy_ref"
              git pull --ff-only origin "$deploy_ref"
            fi

            cd ResourciaBackend/src

            docker compose -f "$compose_file" pull || true
            docker compose -f "$compose_file" up -d --build --remove-orphans
            docker compose -f "$compose_file" ps

      - name: Health check
        if: ${{ env.VPS_HEALTHCHECK_URL != '' }}
        shell: bash
        run: |
          curl --fail --show-error --location --retry 10 --retry-delay 5 "${VPS_HEALTHCHECK_URL}"
