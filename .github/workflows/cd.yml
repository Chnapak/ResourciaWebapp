name: CD

on:
  push:
    branches: [main]
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy_staging:
    if: github.ref == 'refs/heads/main' && secrets.STAGING_DEPLOY_HOST != ''
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy via SSH (staging)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.STAGING_DEPLOY_HOST }}
          username: ${{ secrets.STAGING_DEPLOY_USER }}
          key: ${{ secrets.STAGING_DEPLOY_KEY }}
          port: ${{ secrets.STAGING_DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.STAGING_DEPLOY_PATH }}"
            git fetch --all
            git checkout main
            git pull
            cd ResourciaBackend/src
            docker compose up -d --build

  deploy_production:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH (production)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: ${{ secrets.PROD_DEPLOY_USER }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          port: ${{ secrets.PROD_DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.PROD_DEPLOY_PATH }}"
            git fetch --all
            git checkout main
            git pull
            cd ResourciaBackend/src
            docker compose up -d --build
